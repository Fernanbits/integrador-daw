<form [formGroup]="form" class="login-wrapper">
    <div class="login-card p-fluid">
        <h2 class="login-header">Sistema de Gestión de Proyectos - Grupo AM</h2>

        <div class="field">
            <input pInputText id="nombre" type="text" placeholder="Nombre de usuario" formControlName="nombre" />
        </div>

        <div class="field">
            <p-password id="clave" formControlName="clave" [feedback]="false" autocomplete="off" placeholder="Clave de acceso"></p-password>
        </div>

        <div class="field-action">
            <p-button label="Iniciar sesión" icon="pi pi-sign-in" (click)="iniciarSesion()"></p-button>
        </div>
    </div>
</form>
