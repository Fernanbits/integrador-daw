<p-dialog [header]="header()" [modal]="true" closeAriaLabel="Cerrar diálogo" [(visible)]="visible"
    [style]="{ width: '25rem', maxWidth: 'calc(100vw - 2rem)' }"
    (onHide)="cerrarDialog()">

    <form [formGroup]="form" class="entity-form" (ngSubmit)="guardarTarea()">
            <label for="descripcion">Descripción de la tarea</label>
            <input pInputText type="text" id="descripcion" placeholder="Ej. Validar formulario de acceso" formControlName="descripcion"
                [attr.aria-invalid]="form.controls['descripcion'].touched && form.controls['descripcion'].invalid"
                aria-describedby="tarea-descripcion-error" />
            @if (form.controls['descripcion'].touched && form.controls['descripcion'].invalid) {
                <small id="tarea-descripcion-error" class="form-error">Ingresá la descripción de la tarea.</small>
            }

            <label for="tarea-prioridad">Prioridad</label>
            <select id="tarea-prioridad" formControlName="prioridad" aria-label="Prioridad de la tarea">
                @for (prioridad of prioridades(); track prioridad) {
                    <option [value]="prioridad">{{ etiquetaPrioridad(prioridad) }}</option>
                }
            </select>

            <label for="tarea-vencimiento">Fecha de vencimiento</label>
            <input pInputText type="date" id="tarea-vencimiento" formControlName="fechaVencimiento" aria-label="Fecha de vencimiento de la tarea" />

            @if (tareaSeleccionada()) {
                <label for="tarea-estado">Estado</label>
                <select id="tarea-estado" formControlName="estado" aria-label="Estado de la tarea">
                    @for (estado of estados(); track estado) {
                        <option [value]="estado">{{ etiquetaEstado(estado) }}</option>
                    }
                </select>
            }

            <button pButton type="submit" icon="pi pi-check" label="Guardar tarea"
                [loading]="guardando()" [disabled]="guardando()"></button>
    </form>
</p-dialog>
